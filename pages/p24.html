<div class="phead"><span class="ptag">p.24</span><h2>2　民主主義を実現するための政治改革（日本）</h2><button class="sec-toggle">このページを隠す</button></div>
<p>（1）<b>首相公選制の導入案</b>　わが国では、内閣総理大臣は<b>国民</b>の選挙で選ぶのではなく、<b>国会</b>が指名するという<span class="b"><i>④</i><em>議院内閣</em></span>制がとられている。長期安定政権下では議会による内閣へのコントロールが及びにくくなるため、首相を国民が直接選ぶ首相公選制の導入案が提唱されていた。しかし実現には憲法67条の改正が必要なため、実現可能性は低い。</p>
